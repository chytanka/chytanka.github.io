<svg width="0" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="circleBlur" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">

      <ng-container *ngFor="let offset of offsets; let i = index">
        <feOffset [attr.dx]="offset.dx" [attr.dy]="offset.dy" in="SourceGraphic" [attr.result]="'o'+i"></feOffset>
        <feComponentTransfer [attr.in]="'o'+i" [attr.result]="'cT'+i">
          <feFuncA type="table" [attr.tableValues]="'0 ' + opacity(i)"></feFuncA>
        </feComponentTransfer>
      </ng-container>

      <feMerge result="merge">
        <ng-container *ngFor="let offset of offsets; let i = index">
          <feMergeNode [attr.in]="'cT'+i"></feMergeNode>
        </ng-container>
      </feMerge>

      <!-- <feGaussianBlur [attr.stdDeviation]="gaussianBlur" in="SourceGraphic" edgeMode="none" result="blur" /> -->
      <feGaussianBlur [attr.stdDeviation]="2" in="merge" edgeMode="none" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur2" />
      </feMerge>
    </filter>
  </defs>
</svg>

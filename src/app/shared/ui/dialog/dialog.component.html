<dialog #dialog (click)="closeDialog($event)">
    @if (gamepad.connected()) {
    <gamepad-cursor [cursorVisible]="gamepad.cursorVisible()" [x]="gamepad.x()" [y]="gamepad.y()" />
    }
    <div class="dialog-wrapper">
        <header>
            <h4>{{title()}}</h4>
            @if (closeHeaderButton()) {
            <form method="dialog">
                <button [vibrateHaptic]="10" class="button empty ">
                    ❌
                </button>
            </form>
            }
        </header>
        <section>
            <ng-content />
        </section>
        @if(footer()){
        <footer>
            <form method="dialog">
                <button [vibrateHaptic]="10" class="button primary full">
                    {{lang.ph().ok}}
                </button>
            </form>
        </footer>
        }
    </div>
</dialog>
